# Free alternative to Vercel Cron — runs on GitHub-hosted runners
# Add these repository secrets: CRON_SECRET, APP_URL (e.g. https://your-app.vercel.app)

name: Cron Jobs

on:
  schedule:
    # Adjudicator: every 15 min (providers without webhooks: weather/AQI/news polling)
    - cron: "*/15 * * * *"
    # Weekly premium: Sunday 17:30 UTC
    - cron: "30 17 * * 0"
  workflow_dispatch: # Manual trigger from Actions tab
    inputs:
      job:
        description: "Which job to run"
        required: true
        default: "adjudicator"
        type: choice
        options:
          - adjudicator
          - weekly-premium

jobs:
  adjudicator:
    runs-on: ubuntu-latest
    if: |
      github.event.schedule == '*/15 * * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'adjudicator')
    steps:
      - name: Check cron secrets
        run: |
          if [ -z "${{ secrets.APP_URL }}" ]; then
            echo "::error::APP_URL is not set. Add it in repo Settings → Secrets and variables → Actions (e.g. https://your-app.vercel.app)"
            exit 1
          fi
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "::error::CRON_SECRET is not set. Add it in repo Settings → Secrets and variables → Actions (same value as in Vercel env)."
            exit 1
          fi
      - name: Run adjudicator
        run: |
          curl -sf --max-time 120 -X GET "${{ secrets.APP_URL }}/api/cron/adjudicator" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "User-Agent: Oasis-Cron/1.0"
          echo "Adjudicator completed"

  weekly-premium:
    runs-on: ubuntu-latest
    if: |
      github.event.schedule == '30 17 * * 0' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'weekly-premium')
    steps:
      - name: Check cron secrets
        run: |
          if [ -z "${{ secrets.APP_URL }}" ]; then
            echo "::error::APP_URL is not set. Add it in repo Settings → Secrets and variables → Actions (e.g. https://your-app.vercel.app)"
            exit 1
          fi
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "::error::CRON_SECRET is not set. Add it in repo Settings → Secrets and variables → Actions (same value as in Vercel env)."
            exit 1
          fi
      # Route maxDuration = 120; use 130 so client does not kill the request before server completes
      - name: Run weekly premium renewal
        run: |
          curl -sf --max-time 130 -X GET "${{ secrets.APP_URL }}/api/cron/weekly-premium" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "User-Agent: Oasis-Cron/1.0"
          echo "Weekly premium completed"
